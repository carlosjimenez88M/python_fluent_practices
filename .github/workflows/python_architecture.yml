name: python_architecture

on:
  push:
    branches: [master, main, develop]
    paths:
      - "python_architecture/**"
      - ".github/workflows/python_architecture.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "python_architecture/**"
      - ".github/workflows/python_architecture.yml"

jobs:
  ci:
    name: lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_architecture

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: ruff check
        run: uv run ruff check

      - name: ruff format
        run: uv run ruff format --check

      - name: mypy
        run: uv run mypy src

      - name: pytest
        env:
          GUARDIAN_API_KEY: "this-is-not-a-api-key"
          NEWSAPI_API_KEY: "this-is-not-a-api-key"
          OPENAI_API_KEY: "this-is-not-a-api-key"
        run: uv run pytest
